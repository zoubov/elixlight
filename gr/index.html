<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELIXLIGHT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    --radius: 6px;
    --surface-0: #0A0A0A;
    --surface-1: #11100E;
    --surface-2: #1A1814;
    --surface-3: #24201A;
    --text-primary: #E8E4DF;
    --text-secondary: #A09A90;
    --text-muted: #6B6560;
    --border: #22201C;
    --border-strong: #3A3630;
    --border-stronger: #5A5450;
    --accent: #E87B3C;
    --accent-dim: rgba(232,123,60,0.12);
    --moon-color: #0A0A0A;
    --sun-color: #E87B3C;
  }

  [data-theme="light"] {
    --surface-0: #F7F5F2;
    --surface-1: #EDEAE5;
    --surface-2: #E5E1DB;
    --surface-3: #D9D4CD;
    --text-primary: #1A1814;
    --text-secondary: #5A5550;
    --text-muted: #9A958F;
    --border: #D9D4CD;
    --border-strong: #C0BBB4;
    --border-stronger: #A09A90;
    --accent: #D4692A;
    --accent-dim: rgba(212,105,42,0.10);
    --moon-color: #1A1814;
    --sun-color: #D4692A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--surface-0);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    transition: background 0.5s ease, color 0.5s ease;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; }

  .w { max-width: 1100px; margin: 0 auto; }

  /* ========== NAV ========== */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 2rem;
    border-bottom: 0.5px solid var(--border);
  }
  .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; }
  .nav-center { font-size: 12px; color: var(--text-muted); font-style: italic; }
  .nav-right-wrap { display: flex; align-items: center; gap: 1rem; }
  .nav-right { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
  .nav-right:hover { color: var(--accent); }
  .lang-btn {
    font-size: 11px;
    background: var(--surface-2);
    border: 0.5px solid var(--border-strong);
    color: var(--text-secondary);
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ========== THEME TOGGLE ========== */
  .theme-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    padding: 0;
  }
  .theme-btn:hover {
    border-color: var(--accent);
    transform: scale(1.08);
  }
  .theme-btn svg {
    width: 16px;
    height: 16px;
    transition: all 0.3s ease;
  }
  .theme-btn .moon-icon {
    display: block;
    fill: var(--moon-color);
  }
  .theme-btn .sun-icon {
    display: none;
    fill: var(--sun-color);
  }
  [data-theme="light"] .theme-btn .moon-icon {
    display: none;
  }
  [data-theme="light"] .theme-btn .sun-icon {
    display: block;
  }

  /* ========== HERO ========== */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 480px;
    border-bottom: 0.5px solid var(--border);
  }
  .hero-visual {
    background: var(--surface-1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 2.5rem;
    border-right: 0.5px solid var(--border);
  }
  .room-box {
    width: 160px;
    height: 160px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 1.2s ease;
  }
  .ldot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    transition: background 1.2s ease, box-shadow 1.2s ease;
  }
  .v-time {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-family: var(--font-mono);
  }
  .v-state {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .hero-services {
    padding: 2rem 2.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .s-super {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    margin-bottom: 0.4rem;
    margin-top: 1.25rem;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }
  .s-super:first-child { margin-top: 0; }
  .s-super:hover { color: var(--accent); }
  .s-item {
    padding: 0.75rem 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
  }
  .s-item:last-child { border-bottom: none; }
  .s-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: padding-left 0.15s;
  }
  .s-item:hover .s-row { padding-left: 0.3rem; }
  .s-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .s-price {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-left: 1rem;
  }
  .s-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-top: 0.6rem;
    padding-bottom: 0.2rem;
    display: none;
    border-left: 1.5px solid var(--border-strong);
    padding-left: 0.75rem;
  }
  .s-desc.open { display: block; }
  .s-contact {
    display: inline-block;
    margin-top: 0.5rem;
    font-size: 12px;
    color: var(--accent);
    text-decoration: underline;
  }

  /* ========== TRUE OR FALSE ========== */
  .q-section {
    padding: 3.5rem 2rem;
    border-bottom: 0.5px solid var(--border);
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    text-align: center;
  }
  .q-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .q-belief {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 2rem;
    color: var(--text-primary);
  }
  .q-reveal-btn {
    font-size: 13px;
    padding: 0.55rem 1.4rem;
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .q-reveal-btn:hover { background: var(--surface-1); }
  .q-answer {
    margin-top: 1.5rem;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    text-align: left;
    padding: 1.25rem;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface-1);
    display: none;
  }
  .q-answer.show { display: block; }
  .q-actions {
    margin-top: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    display: none;
  }
  .q-actions.show { display: flex; }
  .q-next {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    text-decoration: underline;
  }
  .q-sci {
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    text-decoration: underline;
  }

  /* ========== SCIENCE PAGE ========== */
  .sci-page {
    display: none;
    padding: 3.5rem 2rem;
    max-width: 680px;
    margin: 0 auto;
  }
  .sci-page.active { display: block; }
  .sci-back {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    margin-bottom: 2.5rem;
    display: block;
    text-align: left;
  }
  .sci-back:hover { color: var(--text-secondary); }
  .sci-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }
  .sci-body p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 1.5rem;
  }
  .sci-body p strong { color: var(--text-primary); font-weight: 500; }
  .sci-pull {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.45;
    margin: 2.5rem 0;
    padding-left: 1.5rem;
    border-left: 2px solid var(--border-strong);
  }
  .sci-hormones {
    margin: 2rem 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .sci-h-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 1.5rem;
    padding: 1rem 0;
    border-bottom: 0.5px solid var(--border);
  }
  .sci-h-row:last-child { border-bottom: none; }
  .sci-h-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .sci-h-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .sci-end {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 0.5px solid var(--border);
  }

  /* ========== CATEGORY PAGES ========== */
  .cat-page {
    display: none;
    padding: 3.5rem 2rem;
    max-width: 720px;
    margin: 0 auto;
  }
  .cat-page.active { display: block; }
  .cat-back {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    margin-bottom: 2.5rem;
    display: block;
    text-align: left;
  }
  .cat-back:hover { color: var(--text-secondary); }
  .cat-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }
  .cat-intro {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 3rem;
  }
  .cat-service {
    margin-bottom: 3rem;
    padding-bottom: 3rem;
    border-bottom: 0.5px solid var(--border);
  }
  .cat-service:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .cat-service-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .cat-service-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .cat-service-price {
    font-size: 14px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .cat-service-body {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 1.25rem;
  }
  .cat-service-meta {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .cat-service-meta strong {
    color: var(--text-primary);
    font-weight: 500;
  }
  .cat-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 0.5px solid var(--border);
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  /* ========== PAGE TOGGLE ========== */
  .home-content { display: block; }
  .home-content.hidden { display: none; }

  /* ========== FOOTER ========== */
  footer {
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 0.5px solid var(--border);
  }
  footer .copy { font-size: 12px; color: var(--text-muted); }
  footer a { font-size: 13px; color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 860px) {
    .hero { grid-template-columns: 1fr; }
    .hero-visual { border-right: none; border-bottom: 0.5px solid var(--border); }
    .nav { padding: 1.25rem 1.5rem; }
    .q-actions { flex-direction: column; gap: 0.75rem; align-items: center; }
    .sci-h-row { grid-template-columns: 1fr; gap: 0.25rem; }
    .cat-service-header { flex-direction: column; gap: 0.25rem; }
  }
  @media (max-width: 560px) {
    .nav { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
    .hero-services { padding: 2rem 1.5rem; }
    .q-section { padding: 3rem 1.5rem; }
    .sci-page, .cat-page { padding: 2.5rem 1.5rem; }
    footer { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="w">

  <nav class="nav">
    <span class="nav-logo" onclick="goHome()">ELIXLIGHT</span>
    <span class="nav-center" id="navTagline"></span>
    <div class="nav-right-wrap">
      <span class="nav-right" id="navScience" onclick="goScience()"></span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
        <!-- Moon icon (shown in dark mode) -->
        <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon (shown in light mode) -->
        <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">EL</button>
    </div>
  </nav>

  <div class="home-content" id="homeContent">
    <section class="hero">
      <div class="hero-visual">
        <div class="room-box" id="box"><div class="ldot" id="dot"></div></div>
        <div class="v-time" id="vtime">06:00</div>
        <div class="v-state" id="vstate"></div>
      </div>
      <div class="hero-services" id="heroServices"></div>
    </section>

    <section class="q-section">
      <p class="q-label" id="qLabel"></p>
      <p class="q-belief" id="qbelief"></p>
      <button class="q-reveal-btn" id="qbtn" onclick="reveal()"></button>
      <div class="q-answer" id="qanswer"></div>
      <div class="q-actions" id="qactions">
        <button class="q-next" id="qnext" onclick="nextQ()"></button>
        <button class="q-sci" id="qsci" onclick="goScience()"></button>
      </div>
    </section>

    <footer>
      <span class="copy">&copy; 2025 ELIXLIGHT</span>
      <span><a href="mailto:hello@elixlight.com">hello@elixlight.com</a></span>
    </footer>
  </div>

  <div class="sci-page" id="sciPage">
    <button class="sci-back" id="sciBack" onclick="goHome()"></button>
    <p class="sci-title" id="sciTitle"></p>
    <div class="sci-body" id="sciBody"></div>
  </div>

  <div class="cat-page" id="catHomehotel">
    <button class="cat-back" id="catHomehotelBack" onclick="goHome()"></button>
    <p class="cat-title" id="catHomehotelTitle"></p>
    <p class="cat-intro" id="catHomehotelIntro"></p>
    <div id="catHomehotelServices"></div>
    <div class="cat-footer" id="catHomehotelFooter"></div>
  </div>

  <div class="cat-page" id="catProject">
    <button class="cat-back" id="catProjectBack" onclick="goHome()"></button>
    <p class="cat-title" id="catProjectTitle"></p>
    <p class="cat-intro" id="catProjectIntro"></p>
    <div id="catProjectServices"></div>
    <div class="cat-footer" id="catProjectFooter"></div>
  </div>

</div>

<script src="translations.js"></script>
<script src="app.js"></script>

</body>
</html>
